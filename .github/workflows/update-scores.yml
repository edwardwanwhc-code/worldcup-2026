name: Update World Cup 2026 Scores

on:
  schedule:
    # 10:00 HKT = 02:00 UTC, 22:00 HKT = 14:00 UTC
    - cron: '0 2,14 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without committing changes'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
    
    - name: Update match scores
      env:
        FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      run: |
        python .github/scripts/update_scores.py
    
    - name: Check for changes
      id: check_changes
      run: |
        if git diff --quiet; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit and push changes
      if: steps.check_changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add index.html
        git commit -m "📊 Auto-update: $(date +%Y-%m-%d) World Cup scores"
        git push

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC26 — 2026 FIFA 世界盃互動追蹤平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --bg-primary: #080c14;
  --bg-secondary: #0d1420;
  --bg-card: #111827;
  --bg-card-hover: #162033;
  --bg-elevated: #1a2540;
  --border: rgba(255,255,255,0.08);
  --border-accent: rgba(255,193,7,0.3);
  --gold: #FFD700;
  --gold-light: #FFE566;
  --orange: #FF6B00;
  --orange-light: #FF8C38;
  --green: #39FF14;
  --green-dim: #22c55e;
  --blue: #3B82F6;
  --red: #EF4444;
  --gray: #6B7280;
  --text-primary: #F1F5F9;
  --text-secondary: #94A3B8;
  --text-muted: #475569;
  --sidebar-w: 240px;
  --nav-h: 64px;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gray); }

/* ===== KEYFRAMES ===== */
@keyframes pulse-green {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green); }
  50% { opacity: 0.5; box-shadow: 0 0 2px var(--green); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes glow-gold {
  0%, 100% { text-shadow: 0 0 10px rgba(255,215,0,0.5); }
  50% { text-shadow: 0 0 20px rgba(255,215,0,1), 0 0 40px rgba(255,107,0,0.5); }
}
@keyframes bounce-in {
  0% { transform: scale(0.8); opacity: 0; }
  60% { transform: scale(1.05); opacity: 1; }
  100% { transform: scale(1); }
}
@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
}

/* ===== LAYOUT ===== */
.app-container {
  display: flex;
  min-height: 100vh;
}

/* ===== SIDEBAR (Desktop) ===== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  position: fixed;
  left: 0; top: 0;
  height: 100vh;
  z-index: 100;
  display: flex;
  flex-direction: column;
  padding: 0;
  overflow: hidden;
}
.sidebar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--orange), var(--green));
}
.sidebar-logo {
  padding: 24px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}
.logo-icon {
  width: 40px;
  height: 40px;
  flex-shrink: 0;
}
.logo-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 1.4rem;
  line-height: 1;
}
.logo-text span { display: block; }
.logo-text .wc { color: var(--gold); letter-spacing: 1px; }
.logo-text .year { color: var(--text-secondary); font-size: 0.7rem; font-weight: 600; letter-spacing: 3px; }

.sidebar-nav {
  flex: 1;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  color: var(--text-secondary);
  font-size: 0.875rem;
  font-weight: 500;
  border: 1px solid transparent;
  text-decoration: none;
  position: relative;
  overflow: hidden;
}
.nav-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 0 3px 3px 0;
  background: var(--gold);
  transform: scaleY(0);
  transition: transform 0.2s ease;
}
.nav-item:hover {
  color: var(--text-primary);
  background: rgba(255,215,0,0.05);
  border-color: var(--border-accent);
}
.nav-item.active {
  color: var(--gold);
  background: rgba(255,215,0,0.08);
  border-color: var(--border-accent);
}
.nav-item.active::before { transform: scaleY(1); }
.nav-item .nav-icon { flex-shrink: 0; }
.nav-label { font-family: 'Inter', sans-serif; }

.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--text-muted);
}
.sidebar-footer .update-time {
  color: var(--green-dim);
  font-weight: 600;
}

/* ===== MAIN CONTENT ===== */
.main-content {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
  padding-bottom: 32px;
}

/* ===== TOP BAR ===== */
.top-bar {
  background: rgba(8,12,20,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.page-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  letter-spacing: 0.5px;
}
.page-title .accent { color: var(--gold); }
.live-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(57,255,20,0.1);
  border: 1px solid rgba(57,255,20,0.3);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 0.5px;
}
.live-dot {
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse-green 1.5s ease-in-out infinite;
}

/* ===== PAGE SECTIONS ===== */
.page-section {
  display: none;
  padding: 32px;
  animation: fadeInUp 0.3s ease forwards;
}
.page-section.active { display: block; }

/* ===== SECTION HEADER ===== */
.section-header {
  margin-bottom: 24px;
}
.section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title .icon-accent { color: var(--gold); }

/* ===== FILTER BAR ===== */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
  align-items: center;
}
.filter-btn {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
}
.filter-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(255,215,0,0.05);
}
.filter-btn.active {
  background: var(--gold);
  border-color: var(--gold);
  color: #000;
  font-weight: 700;
}
.filter-select {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  outline: none;
  transition: var(--transition);
}
.filter-select:focus { border-color: var(--gold); }

/* ===== DATE HEADER (STICKY) ===== */
.date-header {
  position: sticky;
  top: 71px;
  z-index: 30;
  background: var(--bg-primary);
  padding: 12px 0 8px;
  margin-bottom: 12px;
}
.date-header-inner {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px 18px;
}
.date-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.5px;
}
.date-count {
  font-size: 0.75rem;
  color: var(--text-muted);
  background: var(--bg-card);
  border-radius: 10px;
  padding: 2px 8px;
}

/* ===== MATCH CARDS ===== */
.match-grid {
  display: grid;
  gap: 12px;
  margin-bottom: 8px;
}
.match-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 16px;
  transition: var(--transition);
  cursor: default;
  position: relative;
  overflow: hidden;
}
.match-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.match-card:hover {
  background: var(--bg-card-hover);
  border-color: rgba(255,215,0,0.2);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.match-card:hover::after { opacity: 1; }

.team-side {
  display: flex;
  align-items: center;
  gap: 12px;
}
.team-side.right {
  flex-direction: row-reverse;
  text-align: right;
}
.team-flag {
  width: 48px;
  height: 32px;
  flex-shrink: 0;
  border-radius: 4px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.12);
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
.match-card:hover .team-flag {
  transform: scale(1.15);
  border-color: rgba(255,215,0,0.5);
  box-shadow: 0 0 16px rgba(255,215,0,0.25), 0 4px 12px rgba(0,0,0,0.4);
}

/* Generic flag-img class for all flag <img> tags */
.flag-img {
  width: 40px;
  height: 26px;
  border-radius: 3px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.1);
  vertical-align: middle;
  flex-shrink: 0;
}
.team-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
}

.match-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  min-width: 120px;
}
.match-score {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 2rem;
  font-weight: 900;
  color: var(--text-primary);
  letter-spacing: 2px;
}
.match-vs {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text-muted);
}
.match-time {
  font-size: 0.8rem;
  color: var(--gold);
  font-weight: 600;
}
.match-venue {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-align: center;
  max-width: 120px;
}

.match-card-footer {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  gap: 12px;
}

/* ===== STATUS BADGES ===== */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.status-badge.upcoming {
  background: rgba(255,107,0,0.15);
  border: 1px solid rgba(255,107,0,0.4);
  color: var(--orange-light);
}
.status-badge.live {
  background: rgba(57,255,20,0.1);
  border: 1px solid rgba(57,255,20,0.4);
  color: var(--green);
}
.status-badge.live .live-dot {
  width: 6px; height: 6px;
  animation: pulse-green 1s ease-in-out infinite;
}
.status-badge.finished {
  background: rgba(107,114,128,0.15);
  border: 1px solid rgba(107,114,128,0.3);
  color: var(--gray);
}
.group-badge {
  font-size: 0.7rem;
  color: var(--text-muted);
  background: var(--bg-elevated);
  border-radius: 10px;
  padding: 3px 8px;
  font-weight: 600;
}

/* ===== ICS BUTTON ===== */
.ics-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,215,0,0.3);
  background: rgba(255,215,0,0.05);
  color: var(--gold);
  font-family: 'Inter', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.ics-btn:hover {
  background: rgba(255,215,0,0.12);
  border-color: var(--gold);
  transform: scale(1.02);
}
.ics-btn.success {
  background: rgba(34,197,94,0.1);
  border-color: rgba(34,197,94,0.4);
  color: var(--green-dim);
}

/* ===== KPI CARDS ===== */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--kpi-color, var(--gold));
}
.kpi-card:hover {
  transform: translateY(-3px);
  border-color: var(--border-accent);
  box-shadow: var(--shadow);
}
.kpi-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.kpi-value {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--kpi-color, var(--gold));
  line-height: 1;
  margin-bottom: 4px;
}
.kpi-sub {
  font-size: 0.8rem;
  color: var(--text-secondary);
  font-weight: 500;
}

/* ===== CHART CONTAINERS ===== */
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 32px;
}
.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}
.chart-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.chart-title .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--gold);
}
.chart-canvas-wrap { position: relative; height: 280px; }

/* ===== SCORERS TABLE ===== */
.scorers-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.scorer-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: var(--transition);
}
.scorer-row:hover {
  background: var(--bg-card-hover);
  border-color: rgba(255,215,0,0.2);
}
.scorer-rank {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.2rem;
  font-weight: 900;
  color: var(--text-muted);
  width: 28px;
  text-align: center;
  flex-shrink: 0;
}
.scorer-rank.top { color: var(--gold); }
.scorer-flag { width: 32px; height: 21px; border-radius: 2px; object-fit: cover; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.08); }
.scorer-info { flex: 1; }
.scorer-name {
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text-primary);
}
.scorer-team {
  font-size: 0.75rem;
  color: var(--text-muted);
}
.scorer-goals {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--orange-light);
}
.goal-bar {
  height: 4px;
  background: var(--bg-elevated);
  border-radius: 2px;
  margin-top: 4px;
  overflow: hidden;
}
.goal-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--gold), var(--orange));
  transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
}

/* ===== STANDINGS TABLE ===== */
.standings-table-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
}
.standings-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}
.standings-table th {
  background: var(--bg-elevated);
  padding: 12px 16px;
  text-align: left;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
  transition: var(--transition);
  white-space: nowrap;
}
.standings-table th:hover { color: var(--gold); }
.standings-table th.sorted { color: var(--gold); }
.standings-table td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text-primary);
  white-space: nowrap;
}
.standings-table tr:last-child td { border-bottom: none; }
.standings-table tr:hover td { background: var(--bg-card-hover); }
.team-cell {
  display: flex;
  align-items: center;
  gap: 10px;
}
.team-cell .flag-img {
  width: 28px;
  height: 19px;
  border-radius: 2px;
}

/* ===== QUALIFICATION PAGE ===== */
.groups-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.group-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: var(--transition);
}
.group-card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,215,0,0.2);
  box-shadow: var(--shadow);
}
.group-card-header {
  background: var(--bg-elevated);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.group-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: 1px;
}
.group-card-body { padding: 4px 0; }
.group-team-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: var(--transition);
  cursor: pointer;
}
.group-team-row:last-child { border-bottom: none; }
.group-team-row:hover { background: rgba(255,255,255,0.03); }
.team-status-icon { font-size: 0.9rem; flex-shrink: 0; }
.group-rank {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text-muted);
  width: 16px;
}
.group-flag { width: 28px; height: 19px; border-radius: 2px; object-fit: cover; border: 1px solid rgba(255,255,255,0.08); }
.group-team-name {
  flex: 1;
  font-size: 0.8rem;
  font-weight: 600;
}
.group-pts {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  color: var(--gold);
}

/* ===== BRACKET ===== */
.bracket-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 32px;
  overflow-x: auto;
}
.bracket-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 20px;
}
.bracket-container {
  display: flex;
  gap: 0;
  min-width: 900px;
  align-items: flex-start;
  justify-content: center;
}
.bracket-round {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
}
.bracket-round-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--gold);
  text-align: center;
  margin-bottom: 12px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.bracket-matches {
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  flex: 1;
  width: 100%;
  gap: 8px;
}
.bracket-match {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin: 4px 4px;
  transition: var(--transition);
}
.bracket-match:hover { border-color: rgba(255,215,0,0.3); }
.bracket-team {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-secondary);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.bracket-team:last-child { border-bottom: none; }
.bracket-team.winner { color: var(--gold); font-weight: 700; }
.bracket-team-flag { width: 20px; height: 14px; border-radius: 1px; object-fit: cover; vertical-align: middle; }

/* ===== VOTE PAGE ===== */
.vote-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}
.vote-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  transition: var(--transition);
}
.vote-card:hover {
  border-color: rgba(255,215,0,0.2);
  box-shadow: var(--shadow);
}
.vote-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.vote-match-teams {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
}
.vote-match-time {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 2px;
}
.vote-btns {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.vote-btn {
  padding: 10px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text-secondary);
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.vote-btn:hover:not(:disabled) {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(255,215,0,0.06);
}
.vote-btn.team-a:hover:not(:disabled),
.vote-btn.team-a.voted {
  border-color: var(--blue);
  color: #fff;
  background: rgba(59,130,246,0.2);
}
.vote-btn.draw:hover:not(:disabled),
.vote-btn.draw.voted {
  border-color: var(--gray);
  color: #fff;
  background: rgba(107,114,128,0.2);
}
.vote-btn.team-b:hover:not(:disabled),
.vote-btn.team-b.voted {
  border-color: var(--red);
  color: #fff;
  background: rgba(239,68,68,0.2);
}
.vote-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.vote-results {
  margin-top: 4px;
}
.vote-bar-wrap {
  display: flex;
  height: 10px;
  border-radius: 5px;
  overflow: hidden;
  gap: 2px;
  margin-bottom: 8px;
}
.vote-bar-seg {
  height: 100%;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  border-radius: 5px;
}
.vote-bar-seg.a { background: var(--blue); }
.vote-bar-seg.d { background: var(--gray); }
.vote-bar-seg.b { background: var(--red); }
.vote-pcts {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 600;
}
.vote-total { font-size: 0.7rem; color: var(--text-muted); text-align: center; margin-top: 4px; }

/* ===== PREDICT PAGE ===== */
.predict-layout {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 24px;
  align-items: start;
}
.predict-form-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  position: sticky;
  top: 100px;
}
.predict-form-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--gold);
  margin-bottom: 20px;
}
.form-group {
  margin-bottom: 16px;
}
.form-label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.form-input, .form-select {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  font-size: 0.875rem;
  transition: var(--transition);
  outline: none;
}
.form-input:focus, .form-select:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(255,215,0,0.08);
}
.score-input-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.score-input {
  width: 70px;
  padding: 10px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  text-align: center;
  outline: none;
  transition: var(--transition);
}
.score-input:focus { border-color: var(--gold); }
.score-dash {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text-muted);
}
.submit-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--gold), var(--orange));
  border: none;
  border-radius: var(--radius-sm);
  color: #000;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: var(--transition);
  margin-top: 8px;
}
.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255,215,0,0.3);
}
.submit-btn:active { transform: translateY(0); }

/* ===== LEADERBOARD ===== */
.leaderboard-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.leaderboard-header {
  background: var(--bg-elevated);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.leaderboard-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--text-primary);
}
.lb-row {
  display: grid;
  grid-template-columns: 40px 1fr 80px 70px 80px;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  transition: var(--transition);
  cursor: pointer;
}
.lb-row:last-child { border-bottom: none; }
.lb-row:hover { background: var(--bg-card-hover); }
.lb-row.me { background: rgba(255,215,0,0.05); border-color: rgba(255,215,0,0.2); }
.lb-rank {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.3rem;
  font-weight: 900;
  text-align: center;
}
.lb-rank.gold { color: var(--gold); }
.lb-rank.silver { color: #C0C0C0; }
.lb-rank.bronze { color: #CD7F32; }
.lb-nick {
  font-weight: 600;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  gap: 6px;
}
.lb-stat {
  text-align: center;
  font-size: 0.85rem;
  color: var(--text-secondary);
}
.lb-score {
  text-align: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--gold);
}
.lb-last {
  font-size: 0.75rem;
  color: var(--text-muted);
  text-align: right;
}

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
  animation: fadeInUp 0.2s ease;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  max-width: 560px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  animation: bounce-in 0.3s ease;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.modal-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--gold);
}
.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 1.4rem;
  padding: 4px;
  border-radius: 6px;
  transition: var(--transition);
  line-height: 1;
}
.modal-close:hover { color: var(--text-primary); background: var(--bg-elevated); }
.history-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.history-row:last-child { border-bottom: none; }
.history-match {
  font-size: 0.85rem;
  font-weight: 600;
}
.history-pred {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--orange-light);
}
.history-result {
  font-size: 0.8rem;
  padding: 3px 8px;
  border-radius: 8px;
  font-weight: 700;
}
.history-result.correct {
  background: rgba(34,197,94,0.15);
  color: var(--green-dim);
}
.history-result.wrong {
  background: rgba(239,68,68,0.15);
  color: var(--red);
}
.history-result.pending {
  background: rgba(255,193,7,0.15);
  color: var(--gold);
}
.history-pts {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--gold);
}

/* ===== BOTTOM NAV (Mobile) ===== */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  z-index: 100;
}
.bottom-nav-inner {
  display: flex;
  height: 100%;
  align-items: stretch;
}
.bottom-nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  color: var(--text-muted);
  transition: var(--transition);
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-top: 2px solid transparent;
}
.bottom-nav-item:hover { color: var(--text-secondary); }
.bottom-nav-item.active {
  color: var(--gold);
  border-top-color: var(--gold);
  background: rgba(255,215,0,0.04);
}

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}
.empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-elevated);
  border: 1px solid var(--gold);
  border-radius: 10px;
  padding: 12px 24px;
  font-weight: 600;
  font-size: 0.875rem;
  color: var(--gold);
  z-index: 2000;
  opacity: 0;
  transition: all 0.3s ease;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== ANIMATED BG ===== */
.hero-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.hero-bg::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(255,215,0,0.04) 0%, transparent 70%);
  top: -200px; right: -100px;
  animation: float 8s ease-in-out infinite;
}
.hero-bg::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(255,107,0,0.03) 0%, transparent 70%);
  bottom: -100px; left: 100px;
  animation: float 12s ease-in-out infinite reverse;
}

/* ===== ODDS BAR ===== */
.odds-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.odds-row:last-child { border-bottom: none; }
.odds-team { display: flex; align-items: center; gap: 8px; width: 160px; flex-shrink: 0; }
.odds-flag { width: 24px; height: 16px; border-radius: 2px; object-fit: cover; border: 1px solid rgba(255,255,255,0.08); }
.odds-name { font-size: 0.85rem; font-weight: 600; }
.odds-bar-track {
  flex: 1;
  height: 8px;
  background: var(--bg-elevated);
  border-radius: 4px;
  overflow: hidden;
}
.odds-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--gold), var(--orange));
  transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
}
.odds-pct {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--gold);
  width: 48px;
  text-align: right;
}
.odds-num {
  font-size: 0.8rem;
  color: var(--text-muted);
  width: 48px;
  text-align: right;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1200px) {
  .groups-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 1024px) {
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .charts-row { grid-template-columns: 1fr; }
  .predict-layout { grid-template-columns: 1fr; }
  .predict-form-card { position: static; }
}
@media (max-width: 900px) {
  .vote-grid { grid-template-columns: 1fr; }
  .groups-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .sidebar { display: none; }
  .bottom-nav { display: block; }
  .main-content { margin-left: 0; padding-bottom: calc(var(--nav-h) + 24px); }
  .page-section { padding: 20px 16px; }
  .top-bar { padding: 14px 16px; }
  .page-title { font-size: 1.3rem; }
  .match-card {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
  }
  .match-card .team-side { justify-content: center; }
  .match-card .team-side.right { flex-direction: row; }
  .match-center { flex-direction: row; flex-wrap: wrap; justify-content: center; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .groups-grid { grid-template-columns: repeat(2, 1fr); }
  .lb-row { grid-template-columns: 35px 1fr 60px 55px; }
  .lb-last { display: none; }
  .bracket-container { min-width: 700px; }
}
@media (max-width: 480px) {
  .kpi-row { grid-template-columns: 1fr 1fr; }
  .kpi-value { font-size: 1.6rem; }
  .groups-grid { grid-template-columns: 1fr 1fr; }
  .vote-btns { grid-template-columns: 1fr; }
  .score-input-row { justify-content: center; }
}

/* Empty/placeholder flags */
.flag-img[src=""], .flag-img:not([src]) {
  display: none;
}
.flag-placeholder::before {
  content: "⚽";
  font-size: 1rem;
}
.flag-img:hover {
  transform: scale(1.2);
  transition: transform 0.2s ease;
  cursor: default;
}
</style>
</head>

    <div class="bottom-nav-item" onclick="navigate('qualification')">

<!-- ===== MAIN ===== -->
<main class="main-content">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="page-title" id="topBarTitle"><span class="accent">2026</span> FIFA 世界盃 · 每日賽程</div>

  <!-- ===== PAGE: SCHEDULE ===== -->
  <section class="page-section active" id="page-schedule">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterSchedule('all',this)">全部</button>

      <button class="filter-btn" onclick="filterSchedule('finished',this)">完場</button>
      <button class="filter-btn" onclick="filterSchedule('group',this)">小組賽</button>
      <button class="filter-btn" onclick="filterSchedule('knockout',this)">淘汰賽</button>
      <select class="filter-select" id="groupFilter" onchange="filterByGroup(this.value)">

  };

function getMatchStatus(match) {
  const now = new Date();
  const matchDateTime = new Date(match.date + 'T' + match.time + ':00+08:00');
  const endTime = new Date(matchDateTime.getTime() + 105 * 60 * 1000);
  if (match.status === 'finished' || match.score) return 'finished';
  if (now >= matchDateTime && now <= endTime) return 'live';
  return 'upcoming';
}

  } else {

  }

  const centerContent = m.score && status === 'finished'
    ? `<div class="match-score">${m.score}</div>`
    : `<div class="match-vs">VS</div><div class="match-time">${m.time} HKT</div>`;

  const icsBtn = status !== 'finished'
    ? `<button class="ics-btn" onclick="downloadICS(${m.id},this)"><i data-lucide="calendar-plus" style="width:13px;height:13px;"></i> 加入日曆</button>`

  teamFilter = val;

function applyFilters() {
  let filtered = DATA.matches;
  if (scheduleFilter === 'upcoming') filtered = filtered.filter(m => getMatchStatus(m) !== 'finished');
  if (scheduleFilter === 'finished') filtered = filtered.filter(m => getMatchStatus(m) === 'finished');
  if (scheduleFilter === 'group') filtered = filtered.filter(m => m.group.includes('組'));
  if (scheduleFilter === 'knockout') filtered = filtered.filter(m => !m.group.includes('組') || ['32強','16強','8強','4強','決賽'].some(k => m.group.includes(k)));
  if (groupFilter) filtered = filtered.filter(m => m.group === groupFilter);
  if (teamFilter) filtered = filtered.filter(m => m.homeTeam === teamFilter || m.awayTeam === teamFilter);
  renderSchedule(filtered);
}

function populateTeamFilter() {
  const teams = new Set();
  DATA.matches.forEach(m => { teams.add(m.homeTeam); teams.add(m.awayTeam); });
  const sel = document.getElementById('teamFilter');
  // Build flag lookup from all group teams
  const flagMap = {};
  Object.values(DATA.groups).forEach(g => g.teams.forEach(t => flagMap[t.name] = t.flag));
  [...teams].sort().forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = (flagMap[t] || '') + ' ' + t;
    sel.appendChild(opt);
  });
}

// ICS Download
function downloadICS(matchId, btn) {
  const match = DATA.matches.find(m => m.id === matchId);
  if (!match) return;

  // Convert HKT (UTC+8) to UTC
  const [h, min] = match.time.split(':').map(Number);
  const utcH = h - 8;
  const startDate = new Date(match.date + 'T00:00:00Z');
  startDate.setUTCHours(utcH < 0 ? utcH + 24 : utcH);
  startDate.setUTCMinutes(min);
  if (utcH < 0) startDate.setUTCDate(startDate.getUTCDate() - 1);

  const endDate = new Date(startDate.getTime() + 105 * 60 * 1000);

  const pad = n => String(n).padStart(2, '0');
  const fmt = d => `${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}00Z`;

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//WC26 Tracker//HK//',
    'BEGIN:VEVENT',
    `UID:wc26-${matchId}@worldcup2026`,
    `SUMMARY:🏆 ${match.homeTeam} vs ${match.awayTeam} — 2026 FIFA 世界盃`,
    `DTSTART:${fmt(startDate)}`,
    `DTEND:${fmt(endDate)}`,
    `DESCRIPTION:2026 FIFA 世界盃 | 組別: ${match.group} | 場館: ${match.venue} | 香港時間: ${match.time} HKT`,
    `LOCATION:${match.venue}`,
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `WC26_${match.homeTeam}_vs_${match.awayTeam}.ics`;
  a.click();
  URL.revokeObjectURL(url);

  // Button feedback
  const orig = btn.innerHTML;
  btn.innerHTML = '✓ 已加入！';
  btn.classList.add('success');
  setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('success'); }, 2500);
}

function renderStandingsTable(col, dir) {
  const allTeams = [];
  Object.entries(DATA.groups).forEach(([key, g]) => {
    g.teams.forEach(t => allTeams.push({ ...t, groupKey: key }));
  });
  allTeams.sort((a, b) => {
    const av = a[col] !== undefined ? a[col] : a.name;
    const bv = b[col] !== undefined ? b[col] : b.name;
    if (typeof av === 'string') return av.localeCompare(bv) * dir;
    return (av - bv) * dir;
  });

  document.getElementById('standingsBody').innerHTML = allTeams.map((t, i) => `
    <tr>
      <td><div class="team-cell"><span><img class="flag-img" src="${t.flag}" alt=""></span><span>${t.name}</span></div></td>
      <td>${t.p}</td>
      <td>${t.w}</td>
      <td>${t.d}</td>
      <td>${t.l}</td>
      <td>${t.gf}</td>
      <td>${t.ga}</td>
      <td style="color:${t.gd > 0 ? 'var(--green-dim)' : t.gd < 0 ? 'var(--red)' : 'inherit'}">${t.gd > 0 ? '+' : ''}${t.gd}</td>
      <td style="font-weight:800;color:var(--gold)">${t.pts}</td>
      <td><span class="group-badge">${t.groupKey}組</span></td>
    </tr>
  `).join('');
}

function sortTable(col) {
  if (sortCol === col) sortDir *= -1; else sortDir = -1;
  sortCol = col;
  document.querySelectorAll('.standings-table th').forEach(th => th.classList.remove('sorted'));
  event.target.classList.add('sorted');
  renderStandingsTable(col, sortDir);
}

        plugins: {
          legend: { labels: { color: '#F1F5F9', font: { size: 12 } } },
          tooltip: { backgroundColor: '#1a2540', titleColor: '#FFD700', bodyColor: '#F1F5F9' }
        }
      }
    });
  }, 100);
}

// ====================================================
// VOTE PAGE
// ====================================================
function getVoteMatches() {
  return DATA.matches.filter(m => m.group.includes('組') && m.status !== 'finished' && !m.score).slice(0, 6);
}

function renderVote() {
  const matches = getVoteMatches();
  const grid = document.getElementById('voteGrid');
  if (!matches.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🗳️</div><div class="empty-title">暫無即將開賽的比賽</div><div>小組賽已結束，請等待下一輪賽事</div></div>';
    return;
  }
  grid.innerHTML = matches.map(m => renderVoteCard(m)).join('');
}

function renderVoteCard(m) {
  if (!DATA.votes[m.id]) {
    DATA.votes[m.id] = {
      a: Math.floor(Math.random() * 80) + 20,
      d: Math.floor(Math.random() * 40) + 10,
      b: Math.floor(Math.random() * 70) + 15,
      userVote: null
    };
  }
  const v = DATA.votes[m.id];
  const total = v.a + v.d + v.b;
  const pA = Math.round(v.a / total * 100);
  const pD = Math.round(v.d / total * 100);
  const pB = 100 - pA - pD;
  const voted = v.userVote;

  return `<div class="vote-card" id="vc-${m.id}">
    <div class="vote-card-header">
      <div>
        <div class="vote-match-teams"><img class="flag-img" src="${m.homeFlag}" alt=""> ${m.homeTeam} vs ${m.awayTeam} <img class="flag-img" src="${m.awayFlag}" alt=""></div>
        <div class="vote-match-time">${m.date} ${m.time} HKT · ${m.group} · ${m.venue}</div>
      </div>
      <span class="status-badge upcoming">即將開賽</span>
    </div>
    <div class="vote-btns">
      <button class="vote-btn team-a ${voted === 'a' ? 'voted' : ''}" onclick="castVote(${m.id},'a')" ${voted ? 'disabled' : ''}>
        ${voted === 'a' ? '✓ ' : ''}<img class="flag-img" src="${m.homeFlag}" alt=""> ${m.homeTeam} 勝
      </button>
      <button class="vote-btn draw ${voted === 'd' ? 'voted' : ''}" onclick="castVote(${m.id},'d')" ${voted ? 'disabled' : ''}>
        ${voted === 'd' ? '✓ ' : ''}平局
      </button>
      <button class="vote-btn team-b ${voted === 'b' ? 'voted' : ''}" onclick="castVote(${m.id},'b')" ${voted ? 'disabled' : ''}>
        ${voted === 'b' ? '✓ ' : ''}${m.awayTeam} <img class="flag-img" src="${m.awayFlag}" alt=""> 勝
      </button>
    </div>
    <div class="vote-results">
      <div class="vote-bar-wrap">
        <div class="vote-bar-seg a" style="width:${pA}%"></div>
        <div class="vote-bar-seg d" style="width:${pD}%"></div>
        <div class="vote-bar-seg b" style="width:${pB}%"></div>
      </div>
      <div class="vote-pcts">
        <span style="color:var(--blue)">${pA}%</span>
        <span style="color:var(--gray)">${pD}%</span>
        <span style="color:var(--red)">${pB}%</span>
      </div>
    </div>
    <div class="vote-total">共 <span id="vtotal-${m.id}">${total.toLocaleString()}</span> 票</div>
  </div>`;
}

function castVote(matchId, choice) {
  if (!DATA.votes[matchId]) return;
  const v = DATA.votes[matchId];
  if (v.userVote) return;
  v[choice] += 1;
  v.userVote = choice;
  showToast('✅ 投票成功！');
  // Re-render this card
  const match = DATA.matches.find(m => m.id === matchId);
  const card = document.getElementById('vc-' + matchId);
  if (card && match) {
    const tmp = document.createElement('div');
    tmp.innerHTML = renderVoteCard(match);
    card.outerHTML = tmp.innerHTML;
  }
}

// ====================================================
// PREDICT PAGE
// ====================================================
function renderPredict() {
  // Populate match select
  const upcoming = DATA.matches.filter(m => m.group.includes('組') && !m.score).slice(0, 12);
  const sel = document.getElementById('matchSelect');
  sel.innerHTML = upcoming.map(m => `<option value="${m.id}"><img class="flag-img" src="${m.homeFlag}" alt=""> ${m.homeTeam} vs ${m.awayTeam} <img class="flag-img" src="${m.awayFlag}" alt=""> (${m.date} ${m.time})</option>`).join('');
  updateScoreLabels();
  sel.addEventListener('change', updateScoreLabels);

  renderLeaderboard();
}

function updateScoreLabels() {
  const sel = document.getElementById('matchSelect');
  if (!sel.value) return;
  const m = DATA.matches.find(x => x.id === parseInt(sel.value));
  if (!m) return;
  document.getElementById('scoreTeamA').textContent = m.homeFlag + ' ' + m.homeTeam;
  document.getElementById('scoreTeamB').textContent = m.awayTeam + ' ' + m.awayFlag;
}

function submitPrediction() {
  const nick = document.getElementById('nicknameInput').value.trim();
  if (!nick) { showMsg('請先輸入暱稱！', 'var(--red)'); return; }
  const matchId = parseInt(document.getElementById('matchSelect').value);
  const a = parseInt(document.getElementById('scoreA').value) || 0;
  const b = parseInt(document.getElementById('scoreB').value) || 0;
  const match = DATA.matches.find(m => m.id === matchId);
  if (!match) return;

  myNickname = nick;

  // Check if user already predicted this match
  let user = DATA.predictions.find(p => p.nick === nick);
  if (!user) {
    user = { nick, preds: [] };
    DATA.predictions.push(user);
  }
  if (user.preds.find(p => p.matchId === matchId)) {
    showMsg(`已估過此場！`, 'var(--orange)');
    return;
  }

  // Calculate pts if match is done
  let pts = 0, star = false;
  if (match.score) {
    const [ra, rb] = match.score.split('-').map(Number);
    const predResult = a > b ? 'W' : a < b ? 'L' : 'D';
    const realResult = ra > rb ? 'W' : ra < rb ? 'L' : 'D';
    if (predResult === realResult) pts += 1;
    if (a === ra && b === rb) { pts += 3; star = true; }
  }

  user.preds.push({ matchId, a, b, pts, star });
  showMsg(`✅ 估分已提交！${myNickname} 估 ${match.homeTeam} ${a} - ${b} ${match.awayTeam}`, 'var(--green-dim)');
  renderLeaderboard();
  showToast('🎯 估分提交成功！');
}

function showMsg(txt, color = 'var(--green-dim)') {
  const el = document.getElementById('predictMsg');
  el.style.color = color;
  el.textContent = txt;
  setTimeout(() => el.textContent = '', 4000);
}

function calcUserScore(user) {
  const correct = user.preds.filter(p => p.pts > 0).length;
  const total = user.preds.reduce((a, p) => a + p.pts, 0);
  return { correct, total };
}

function renderLeaderboard() {
  const sorted = [...DATA.predictions].map(u => {
    const sc = calcUserScore(u);
    const last = u.preds.length ? u.preds[u.preds.length - 1] : null;
    const lastMatch = last ? DATA.matches.find(m => m.id === last.matchId) : null;
    const lastStr = lastMatch ? `<img class="flag-img" src="${lastMatch.homeFlag}" alt=""> ${lastMatch.homeTeam} ${last.a}-${last.b} ${lastMatch.awayTeam} <img class="flag-img" src="${lastMatch.awayFlag}" alt="">` : '-';
    return { ...u, ...sc, lastStr };
  }).sort((a, b) => b.total - a.total || b.correct - a.correct);

  const rankColors = ['gold', 'silver', 'bronze'];
  document.getElementById('leaderboardBody').innerHTML = sorted.map((u, i) => `
    <div class="lb-row ${u.nick === myNickname ? 'me' : ''}" onclick="showHistory('${u.nick}')">
      <div class="lb-rank ${rankColors[i] || ''}">${i === 0 ? '👑' : i + 1}</div>
      <div class="lb-nick">${u.nick === myNickname ? '⭐ ' : ''}${u.nick}</div>
      <div class="lb-stat">${u.correct} / ${u.preds.length}</div>
      <div class="lb-score" data-count="${u.total}">${u.total}</div>
      <div class="lb-last">${u.lastStr}</div>
    </div>
  `).join('');
}

function showHistory(nick) {
  const user = DATA.predictions.find(u => u.nick === nick);
  if (!user) return;
  document.getElementById('modalTitle').innerHTML = `📋 ${nick} 的估分歷史`;
  document.getElementById('modalBody').innerHTML = user.preds.length === 0
    ? '<div class="empty-state"><div class="empty-title">暫無估分記錄</div></div>'
    : user.preds.map(p => {
        const m = DATA.matches.find(x => x.id === p.matchId);
        if (!m) return '';
        const isPending = !m.score;
        let resultClass = 'pending', resultText = '待定';
        if (!isPending) {
          resultClass = p.pts > 0 ? 'correct' : 'wrong';
          resultText = p.pts > 0 ? (p.star ? '🌟 完全命中' : '✓ 猜中') : '✗ 未中';
        }
        return `<div class="history-row">
          <div class="history-match"><img class="flag-img" src="${m.homeFlag}" alt=""> ${m.homeTeam} vs ${m.awayTeam} <img class="flag-img" src="${m.awayFlag}" alt=""></div>
          <div class="history-pred">${p.a} - ${p.b}</div>
          <div class="history-result ${resultClass}">${resultText}</div>
          <div class="history-pts">${isPending ? '-' : '+'+p.pts}</div>
        </div>`;
      }).join('');
  document.getElementById('historyModal').classList.add('open');
}

function closeModal() {
  document.getElementById('historyModal').classList.remove('open');
}

// ====================================================
// COUNT-UP ANIMATION
// ====================================================
function countUp(el, target, duration = 1200) {
  const start = Date.now();
  const step = () => {
    const elapsed = Date.now() - start;
    const progress = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.floor(ease * target);
    if (progress < 1) requestAnimationFrame(step);
    else el.textContent = target;
  };
  requestAnimationFrame(step);
}
function countUpFloat(el, target, duration = 1200) {
  const start = Date.now();
  const step = () => {
    const elapsed = Date.now() - start;
    const progress = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    el.textContent = (ease * target).toFixed(1);
    if (progress < 1) requestAnimationFrame(step);
    else el.textContent = target.toFixed(1);
  };
  requestAnimationFrame(step);
}

// ====================================================
// TOAST
// ====================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// HASH ROUTING
// ====================================================
window.addEventListener('hashchange', () => {
  const page = location.hash.replace('#', '') || 'schedule';
  const valid = ['schedule','stats','qualification','vote','predict'];
  navigate(valid.includes(page) ? page : 'schedule');
});

// INIT
// ====================================================
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  populateTeamFilter();
  renderSchedule(DATA.matches);

  // Handle initial hash
  const initPage = location.hash.replace('#', '') || 'schedule';
  const valid = ['schedule','stats','qualification','vote','predict'];
  if (valid.includes(initPage)) navigate(initPage);
});
</script>
